name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync project
        run: uv sync
      - name: Run smoke test (protocol + security boundary)
        run: uv run python client_smoke_test.py
